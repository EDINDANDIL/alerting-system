httpServer {
  publicApiHttpPort = 8084
  privateApiHttpPort = 8089
}
db {
    jdbcUrl = "jdbc:postgresql://localhost:5432/filter_db"
    username = "filter"
    password = "filter"
    schema = "public"
    poolName = "kora"
    maxPoolSize = 10
    minIdle = 0
    connectionTimeout = "10s"
    validationTimeout = "5s"
    idleTimeout = "10m"
    maxLifetime = "15m"
    leakDetectionThreshold = "0s"
    initializationFailTimeout = "0s"
    readinessProbe = false
}
scheduling {
    threads = 4
    shutdownWait = "30s"
    telemetry {
        logging {
            enabled = true
        }
        metrics {
            enabled = true
            slo = [ 1, 10, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 30000, 60000, 90000 ]
        }
        tracing {
            enabled = true
        }
    }
}
kafka {
  EventProducer {
    topic = "filter-topic"
    driverProperties {
      "bootstrap.servers" = "localhost:9092,localhost:9094"
      "acks" = "all"
      "enable.idempotence" = true
      "delivery.timeout.ms" = 60000
      "request.timeout.ms" = 30000
      "retry.backoff.ms" = 100
    }
  }
}