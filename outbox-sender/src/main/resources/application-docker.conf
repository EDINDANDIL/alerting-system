# Конфигурация для Docker-окружения

httpServer {
  publicApiHttpPort = 9099
  privateApiHttpPort = 9089
}

db {
    jdbcUrl = ${DB_URL}
    username = ${DB_USERNAME}
    password = ${DB_PASSWORD}
    schema = "public"
    poolName = "kora"
    maxPoolSize = 10
    minIdle = 0
    connectionTimeout = "10s"
    validationTimeout = "5s"
    idleTimeout = "10m"
    maxLifetime = "15m"
    leakDetectionThreshold = "0s"
    initializationFailTimeout = "0s"
    readinessProbe = false
}

scheduling {
    threads = 4
    shutdownWait = "30s"
    telemetry {
        logging {
            enabled = true
        }
        metrics {
            enabled = true
            slo = [ 1, 10, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 30000, 60000, 90000 ]
        }
        tracing {
            enabled = true
        }
    }
}

kafka {
    EventProducer {
        topic = "filter-topic"
        driverProperties {
            "bootstrap.servers" = ${KAFKA_BOOTSTRAP_SERVERS}
            "acks" = "all"
            "enable.idempotence" = true
            "delivery.timeout.ms" = 60000
            "request.timeout.ms" = 30000
            "retry.backoff.ms" = 100
        }
    }
}
