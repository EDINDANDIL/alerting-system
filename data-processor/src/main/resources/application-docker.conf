# Конфигурация для Docker-окружения

httpServer {
  publicApiHttpPort = 8082
  privateApiHttpPort = 8087
}

kafka {

    TradesConsumer {
        topics = ["trades-topic"]
        offset = "latest"
        pollTimeout = "5s"
        threads = 1
        shutdownWait = "30s"

        driverProperties {
            "bootstrap.servers" = ${KAFKA_BOOTSTRAP_SERVERS}
            "group.id" = "data-processor-trades-group"
            "key.deserializer" = "org.apache.kafka.common.serialization.StringDeserializer"
            "enable.auto.commit" = false
            "auto.offset.reset" = "latest"
            "max.poll.records" = 500
            "fetch.min.bytes" = 1
            "fetch.max.wait.ms" = 10
        }
    }

    eventConsume {
        topics = ["filter-topic"]
        offset = "earliest"
        pollTimeout = "5s"
        threads = 1
        shutdownWait = "30s"

        driverProperties {
            "bootstrap.servers" = ${KAFKA_BOOTSTRAP_SERVERS}
            "group.id" = "data-processor-filter-events-group"
            "key.deserializer" = "org.apache.kafka.common.serialization.StringDeserializer"
            "enable.auto.commit" = false
            "auto.offset.reset" = "earliest"
            "max.poll.records" = 200
            "fetch.max.wait.ms" = 10
        }
    }

    alertProducer {
        topics = ["alert-topic"]
        driverProperties {
            "bootstrap.servers" = ${KAFKA_BOOTSTRAP_SERVERS}
            "key.serializer" = "org.apache.kafka.common.serialization.StringSerializer"
            "value.serializer" = "org.apache.kafka.common.serialization.StringSerializer"
            "enable.idempotence" = true
            "acks" = "all"
            "retry.backoff.ms" = 100
            "linger.ms" = 5
        }
    }
}

logging {
    levels {
        "ROOT" = "INFO"
        "ru" = "DEBUG"
        "org.apache.kafka" = "WARN"
    }
}

kafka.TradesConsumer.telemetry.logging.enabled = false
kafka.eventConsume.telemetry.logging.enabled = false
