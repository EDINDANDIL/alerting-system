# Конфигурация для Docker-окружения
# Переменные окружения подставляются из docker-compose.yml

httpServer {
  publicApiHttpPort = 8081
  privateApiHttpPort = 8086
}

db {
    jdbcUrl = ${DB_URL}
    username = ${DB_USERNAME}
    password = ${DB_PASSWORD}
    schema = "public"
    poolName = "kora"
    maxPoolSize = 10
    minIdle = 0
    connectionTimeout = "10s"
    validationTimeout = "5s"
    idleTimeout = "10m"
    maxLifetime = "15m"
    leakDetectionThreshold = "0s"
    initializationFailTimeout = "0s"
    readinessProbe = false
    dsProperties {
        "hostRecheckSeconds": "2"
    }
    telemetry {
        logging {
          levels {
            "ru.tinkoff.kora.http.server.common.telemetry": "INFO"
            "ru.tinkoff.kora.http.client.common.telemetry.DefaultHttpClientTelemetry": "INFO"
          }
          aspect {
              enabled = true
              defaultLevel = "INFO"
              logInput = true
              logOutput = true
            }
        }
        metrics {
            enabled = true
            slo = [ 1, 10, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 30000, 60000, 90000 ]
        }
        tracing {
            enabled = true
            db.telemetry.logging.enabled = true
            httpServer.telemetry.logging.enabled = true
        }
    }
}

scheduling {
    threads = 4
    shutdownWait = "30s"
    telemetry {
        logging {
            enabled = true
        }
        metrics {
            enabled = true
            slo = [ 1, 10, 50, 100, 200, 500, 1000, 2000, 5000, 10000, 20000, 30000, 60000, 90000 ]
        }
        tracing {
            enabled = true
        }
    }
}

flyway {
    enabled = true
    jdbcUrl = ${db.jdbcUrl}
    username = ${db.username}
    password = ${db.password}
    locations = ["classpath:db/migration"]
    baselineOnMigrate = false
    validateOnMigrate = true
    cleanDisabled = false
}

kafka {
    EventProducer {
        topic = "filter-topic"
        driverProperties {
            "bootstrap.servers" = ${KAFKA_BOOTSTRAP_SERVERS}
            "acks" = "all"
            "enable.idempotence" = true
            "delivery.timeout.ms" = 60000
            "request.timeout.ms" = 30000
            "retry.backoff.ms" = 100
        }
        telemetry {
            metrics {
                enabled = false
            }
            tracing {
                enabled = false
            }
            logging {
                enabled = false
            }
        }
    }
}

