# Kafka для связки C++ API ↔ любой язык. Этот compose — единственный кластер для интеграции.
# Bootstrap (EXTERNAL): localhost:92 обязательно, затем localhost:9094, localhost:9096
# Клиенты на любом языке (Java, Python, Go, …) подключаются сюда, формат топиков — в README.
# Топики: trades-topic (трейды), cxet.commands (команды из любого языка → C++), далее cxet.klines.binary.v1, cxet.funding.binary.v1, cxet.orderbook.binary.v1.
# cxet.commands: value = UTF-8 строка команды (subscribe().object(trades)..., unsubscribe().slots(all), get().object(tickers)...). Любой язык → produce → C++ выполнит.
# Ключ партиции trades: exchange|market|symbol. 32 партиции.
# Start: docker compose -f src/java/KafkaClusterDocker-compose.yaml up -d
services:

  kafka1:
    image: apache/kafka:3.9.1
    container_name: kafka1
    ports:
      - "9092:19092"
      - "9093:9093"

    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 32
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_KRAFT_CLUSTER_ID: "DqqvGAQURkej_lZD0qN_vA"
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka1:9092,EXTERNAL://localhost:9092,CONTROLLER://kafka1:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 10000
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      # Режим «труба»: данные пришли → отдались → удалились. Консьюмер должен успевать читать.
      KAFKA_LOG4J_LOGGERS: kafka=INFO,org.apache.kafka=INFO
      KAFKA_HEAP_OPTS: -Xmx2g -Xms1g
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka1_data:/var/lib/kafka/data
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 1G
  kafka2:
    image: apache/kafka:3.9.1
    container_name: kafka2
    ports:
      - "9094:19092"  # EXTERNAL listener
      - "9095:9093"   # CONTROLLER
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 32
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_KRAFT_CLUSTER_ID: "DqqvGAQURkej_lZD0qN_vA"
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:9092,EXTERNAL://localhost:9094,CONTROLLER://kafka2:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9093,3@kafka3:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 10000
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_MS: 1
      KAFKA_LOG_RETENTION_BYTES: 1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 1000
      KAFKA_LOG4J_LOGGERS: "kafka=INFO,org.apache.kafka=INFO"
      KAFKA_HEAP_OPTS: "-Xmx2g -Xms1g"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka2_data:/var/lib/kafka/data
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 1G

  kafka3:
    image: apache/kafka:3.9.1
    container_name: kafka3
    ports:
      - "9096:19092"
      - "9097:9093"
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
      KAFKA_NUM_PARTITIONS: 5
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_KRAFT_CLUSTER_ID: "DqqvGAQURkej_lZD0qN_vA"
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka3:9092,EXTERNAL://localhost:9096,CONTROLLER://kafka3:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka1:9093,2@kafka2:9093,3@kafka3:9093'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 10000
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_LOG_RETENTION_MS: 1
      KAFKA_LOG_RETENTION_BYTES: 1
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 1000
      KAFKA_LOG4J_LOGGERS: "kafka=INFO,org.apache.kafka=INFO"
      KAFKA_HEAP_OPTS: "-Xmx2g -Xms1g"

      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka3_data:/var/lib/kafka/data
    networks:
      - kafka-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '2'
          memory: 1G

networks:
  kafka-network:
    name: kafka-network

volumes:
  kafka1_data:
  kafka2_data:
  kafka3_data:
  kafka_streams_data:
